services:

  qbittorrent:
    #image: lscr.io/linuxserver/qbittorrent:4.6.2-r0-ls302
    image: lscr.io/linuxserver/qbittorrent:5.0.2-r0-ls367
    container_name: qbittorrent
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - WEBUI_PORT=8112
      - QBITTORRENT_INTERFACE=tun0  # 🔒 Forces all traffic through VPN interface
     
     # 🔄 Port Forwarding Mod (Syncs qBittorrent with Gluetun)
      - DOCKER_MODS=ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
      - GSP_GTN_API_KEY=${GSP_GTN_API_KEY}  # API key for port forwarding updates
      #- GSP_GTN_PORT_INDEX=1
      - GSP_MINIMAL_LOGS=false  # Enables full logs for debugging purposes
    volumes:
      - $CONFIGROOT/qbittorrent:/config
      - $MEDIAROOT:/media
    network_mode: "container:gluetun"  # 🔒 Ensures qBittorrent ONLY works through the VPN (Prevents leaks)
    
    #depends_on:
    #  gluetun:
    #    condition: service_healthy  # Ensures qBittorrent starts only when the VPN is fully functional
    
    restart: unless-stopped
    labels:
      - "traefik.enable=true"   
      # web      
      - "traefik.http.routers.qbittorrent-rtr.rule=Host(`qbittorrent.$DOMAINNAME`)"
      - "traefik.http.routers.qbittorrent-rtr.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent-rtr.service=qbittorrent-svc"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8112"
    # ─── Performance Optimization ──────────────────────────────────────
    ulimits:
      nofile:
        soft: 32768
        hard: 65536  # Increases allowed open files (important for high-speed torrenting)

networks:
  myNetwork:
    external: true
