services:
  tautulli:
    image: linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - $CONFIGROOT/tautulli:/config
    restart: unless-stopped
    labels:
      - "traefik.enable=true"     
      # web      
      - "traefik.http.routers.tautulli-https.rule=Host(`tautulli.$DOMAINNAME`)"
      - "traefik.http.routers.tautulli-https.entrypoints=websecure"
      - "traefik.http.routers.tautulli-https.service=tautulli-svc"
      - "traefik.http.services.tautulli-svc.loadbalancer.server.port=8181"   

networks:
  default:
    external: true
    name: myNetwork
