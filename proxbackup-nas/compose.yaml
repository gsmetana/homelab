services:
  tailscale-proxbackup:
    image: tailscale/tailscale:latest
    container_name: tailscale-proxbackup
    #hostname: tailscale-proxbackup
    hostname: tailscale-pbs
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale # Persistent entry TS Machines, not Epehmeral
      - TS_USERSPACE=false
    volumes:
      - $CONFIGROOT/proxbackup/state/:/var/lib
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  proxbackup-client:
    image: aterfax/pbs-client
    container_name: proxbackup-client
    restart: unless-stopped
    depends_on:
      - tailscale-proxbackup
    network_mode: service:tailscale-proxbackup
    environment:
     - PBS_ENDPOINT=${PBS_ENDPOINT}
     - PBS_DATASTORE=${PBS_DATASTORE}
     - PBS_API_KEY_NAME=${PBS_API_KEY_NAME}
     - PBS_API_KEY_SECRET=${PBS_API_KEY_SECRET}
     - PBS_FINGERPRINT=${PBS_FINGERPRINT}

     - TZ=$TZ
     - CRON_SCHEDULE=0 2 * * *
    # If you want to skip backup on startup, set CRON_BACKUP_ONLY=1 otherwise CRON_BACKUP_ONLY=0
     - CRON_BACKUP_ONLY=0

    # Set UNENCRYPTED=1 to bypass automatic encryption key generation and allow the backups to be unencrypted.
    # This is a bad idea as the owner of the PBS backup server you are backing up to will have full access to 
    # explore the backed-up content.
     - UNENCRYPTED=1

    tmpfs:
      - /run:exec
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 1073741824

      - $CONFIGROOT/proxbackup/config/:/root/.config/proxmox-backup/
      # Note - if you want to restore backups make sure to change to read write below.
      # See the 'restore-backup' command inside the container.
      #- ../:/backups/test1:ro
      - $RAIDROOT/home/:/backups/home:ro
      - $RAIDROOT/backup/:/backups/backup:ro
      - $CONFIGROOT/radarr/Backups/:/backups/docker/radarr:ro
      - $CONFIGROOT/sonarr/Backups/:/backups/docker/sonarr:ro
      - $CONFIGROOT/lidarr/Backups/:/backups/docker/lidarr:ro

      #- ./backups/test2:/backups/test2:ro
      #- ./backups/test3:/backups/test3:ro
